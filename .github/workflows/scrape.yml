name: Daily Eta Ranking Scraper

on:
  schedule:
    # 매일 UTC 01:30 (한국 시간 오전 10시 30분) 실행
    - cron: '30 1 * * *'
  workflow_dispatch:
    # 수동 실행 허용

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json # 만약 lock 파일이 없을 수 있으므로 없어도 대비

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Scraper
        run: npm start

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 확인
          git add eta_ranking.json
          
          # 변경된 사항이 있을 때만 커밋 및 푸시
          if git diff --cached --quiet; then
            echo "No changes in eta_ranking.json. Skipping push."
          else
            git commit -m "chore: update daily eta rankings ($(date +'%Y-%m-%d'))"
            git push origin feature/chat-overlay # 현재 기능 브랜치에 푸시하되, 나중에 main으로 병합되면 알아서 작동하도록 push 대상 설정
          fi
